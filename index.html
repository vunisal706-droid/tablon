<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muro de Avisos · CEIP Capitulaciones</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

<style>
  :root {
    --verde: #2d6a4f;
    --verde-claro: #40916c;
    --verde-palido: #d8f3dc;
    --ocre: #e9c46a;
    --ocre-oscuro: #c9922a;
    --crema: #fdf8f0;
    --carbon: #1a1a2e;
    --gris: #6b7280;
    --blanco: #ffffff;
    --sombra: 0 4px 24px rgba(0,0,0,0.10);
    --sombra-hover: 0 12px 40px rgba(0,0,0,0.18);
    --radio: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--crema);
    color: var(--carbon);
    min-height: 100vh;
  }

  /* ── HEADER ─────────────────────────────────── */
  header {
    background: var(--verde);
    color: var(--blanco);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(45,106,79,0.35);
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .header-logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-fox {
    width: 48px;
    height: 48px;
    background: var(--ocre);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }

  .header-text h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem;
    font-weight: 900;
    line-height: 1.1;
    letter-spacing: -0.01em;
  }

  .header-text p {
    font-size: 0.75rem;
    opacity: 0.75;
    margin-top: 2px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .header-badge {
    background: var(--ocre);
    color: var(--carbon);
    font-size: 0.7rem;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ── HERO STRIP ─────────────────────────────── */
  .hero-strip {
    background: linear-gradient(135deg, var(--verde-claro) 0%, var(--verde) 100%);
    padding: 32px 24px 48px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .hero-strip::before {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }

  .hero-strip h2 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    color: var(--blanco);
    font-weight: 900;
    position: relative;
  }

  .hero-strip p {
    color: rgba(255,255,255,0.8);
    font-size: 0.95rem;
    margin-top: 6px;
    position: relative;
  }

  /* ── MAIN ───────────────────────────────────── */
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* ── GRID / MASONRY SIMPLE ──────────────────── */
  .muro-grid {
    columns: 3 300px;
    column-gap: 20px;
  }

  .card {
    break-inside: avoid;
    background: var(--blanco);
    border-radius: var(--radio);
    box-shadow: var(--sombra);
    overflow: hidden;
    margin-bottom: 20px;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    cursor: default;
  }

  .card:hover {
    transform: translateY(-4px);
    box-shadow: var(--sombra-hover);
  }

  .card img {
    width: 100%;
    display: block;
    object-fit: cover;
    background: var(--verde-palido);
  }

  .card-body {
    padding: 14px 16px 16px;
    border-top: 3px solid var(--ocre);
  }

  .card-body p {
    font-size: 0.92rem;
    color: var(--carbon);
    line-height: 1.55;
  }

  /* ── ESTADO VACÍO ───────────────────────────── */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--gris);
  }

  .empty-state .icon {
    font-size: 56px;
    margin-bottom: 16px;
    opacity: 0.4;
  }

  .empty-state h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: var(--verde);
    margin-bottom: 8px;
  }

  /* ── LOADING ────────────────────────────────── */
  .loading-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--gris);
    font-size: 0.9rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid var(--verde-palido);
    border-top-color: var(--verde);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── BOTÓN ADMIN ────────────────────────────── */
  .btn-admin-toggle {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--verde);
    color: var(--blanco);
    border: none;
    border-radius: 50px;
    padding: 14px 22px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(45,106,79,0.4);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 200;
  }

  .btn-admin-toggle:hover {
    background: var(--verde-claro);
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(45,106,79,0.45);
  }

  /* ── MODAL ──────────────────────────────────── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,26,46,0.6);
    backdrop-filter: blur(4px);
    z-index: 300;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.open {
    display: flex;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: var(--blanco);
    border-radius: 20px;
    width: 100%;
    max-width: 460px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    overflow: hidden;
    animation: slideUp 0.25s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  .modal-header {
    background: var(--verde);
    color: var(--blanco);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .modal-header h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    font-weight: 700;
  }

  .btn-close {
    background: rgba(255,255,255,0.15);
    border: none;
    color: var(--blanco);
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }

  .btn-close:hover { background: rgba(255,255,255,0.3); }

  .modal-body { padding: 24px; }

  /* ── FORMULARIO ─────────────────────────────── */
  .form-group { margin-bottom: 18px; }

  label {
    display: block;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--verde);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  input[type="password"],
  textarea {
    width: 100%;
    border: 2px solid #e5e7eb;
    border-radius: 10px;
    padding: 10px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--carbon);
    transition: border-color 0.2s;
    background: #fafafa;
  }

  input[type="password"]:focus,
  textarea:focus {
    outline: none;
    border-color: var(--verde-claro);
    background: var(--blanco);
  }

  textarea { resize: vertical; min-height: 90px; }

  .upload-area {
    border: 2.5px dashed var(--verde-claro);
    border-radius: 12px;
    padding: 28px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--verde-palido);
    position: relative;
  }

  .upload-area:hover { border-color: var(--verde); background: #c8ead1; }
  .upload-area.has-file { border-color: var(--ocre-oscuro); background: #fef9ec; }

  .upload-area input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .upload-area .upload-icon { font-size: 32px; margin-bottom: 8px; }
  .upload-area p { font-size: 0.85rem; color: var(--gris); pointer-events: none; }
  .upload-area .file-name { font-weight: 600; color: var(--verde); font-size: 0.85rem; margin-top: 6px; }

  .preview-img {
    width: 100%;
    max-height: 200px;
    object-fit: cover;
    border-radius: 10px;
    margin-top: 12px;
    display: none;
  }

  .btn-submit {
    width: 100%;
    background: var(--verde);
    color: var(--blanco);
    border: none;
    border-radius: 10px;
    padding: 13px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-submit:hover:not(:disabled) {
    background: var(--verde-claro);
    transform: translateY(-1px);
  }

  .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

  /* ── PROGRESS BAR ───────────────────────────── */
  .progress-wrap {
    display: none;
    background: var(--verde-palido);
    border-radius: 8px;
    height: 8px;
    margin-top: 12px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--verde-claro), var(--ocre));
    border-radius: 8px;
    transition: width 0.3s;
    width: 0%;
  }

  /* ── TOAST ──────────────────────────────────── */
  .toast {
    position: fixed;
    bottom: 90px;
    right: 24px;
    background: var(--carbon);
    color: var(--blanco);
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 0.9rem;
    font-weight: 500;
    z-index: 400;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
    max-width: 280px;
  }

  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { background: var(--verde); }
  .toast.error { background: #dc2626; }

  /* ── CARD DELETE (admin mode) ───────────────── */
  .card-admin-bar {
    display: none;
    padding: 8px 12px;
    background: #fff5f5;
    border-top: 1px solid #fee2e2;
    text-align: right;
  }

  body.admin-active .card-admin-bar { display: block; }

  .btn-delete {
    background: none;
    border: none;
    color: #dc2626;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 6px;
    transition: background 0.15s;
  }

  .btn-delete:hover { background: #fee2e2; }

  /* ── PANEL ADMIN ACTIVO ─────────────────────── */
  .admin-banner {
    display: none;
    background: var(--ocre);
    color: var(--carbon);
    text-align: center;
    padding: 8px;
    font-size: 0.82rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  body.admin-active .admin-banner { display: block; }

  /* ── RESPONSIVE ─────────────────────────────── */
  @media (max-width: 600px) {
    .header-inner { padding: 12px 16px; }
    .hero-strip { padding: 24px 16px 36px; }
    main { padding: 24px 12px 80px; }
    .muro-grid { columns: 1; }
  }

  @media (min-width: 601px) and (max-width: 900px) {
    .muro-grid { columns: 2 280px; }
  }
</style>
</head>

<!-- HERO -->
<div class="hero-strip">
  <h2>📋 Muro de Avisos</h2>
  <p>Información y comunicaciones del centro</p>
</div>

<!-- MAIN -->
<main>
  <div id="muroContainer">
    <div class="loading-state">
      <div class="spinner"></div>
      <span>Cargando avisos...</span>
    </div>
  </div>
</main>

<!-- BOTÓN ADMIN -->
<button class="btn-admin-toggle" id="btnAdminToggle" onclick="openAdminModal()">
  <span>⚙️</span> Admin
</button>

<!-- MODAL ADMIN -->
<div class="modal-overlay" id="modalAdmin">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">🔒 Acceso Admin</h3>
      <button class="btn-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">

      <!-- PANTALLA 1: contraseña -->
      <div id="screenPassword">
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="inputPassword" placeholder="Introduce la contraseña" onkeydown="if(event.key==='Enter') checkPassword()">
        </div>
        <button class="btn-submit" onclick="checkPassword()">🔓 Entrar</button>
      </div>

      <!-- PANTALLA 2: subir aviso -->
      <div id="screenUpload" style="display:none">
        <div class="form-group">
          <label>📷 Imagen del aviso</label>
          <div class="upload-area" id="uploadArea">
            <input type="file" id="inputFile" accept="image/*" onchange="onFileChange(event)">
            <div class="upload-icon">🖼️</div>
            <p>Pulsa para seleccionar imagen</p>
            <div class="file-name" id="fileName"></div>
          </div>
          <img id="previewImg" class="preview-img" alt="Preview">
        </div>
        <div class="form-group">
          <label>📝 Descripción</label>
          <textarea id="inputDescripcion" placeholder="Añade una descripción del aviso..." rows="3"></textarea>
        </div>
        <button class="btn-submit" id="btnSubir" onclick="subirAviso()">
          ⬆️ Publicar aviso
        </button>
        <div class="progress-wrap" id="progressWrap">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <div style="margin-top:16px; text-align:center;">
          <button onclick="cerrarSesionAdmin()" style="background:none;border:none;color:var(--gris);font-size:0.82rem;cursor:pointer;text-decoration:underline;">Cerrar sesión admin</button>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  // ══════════════════════════════════════════════════
  //  🔧 CONFIGURACIÓN — rellena con tus datos Firebase
  // ══════════════════════════════════════════════════
  const FIREBASE_CONFIG = {
    apiKey:            "AIzaSyAyxeVnd6mTBzK-J2cI_7LuygIiInXZ660",
    authDomain:        "gestoreva-7315a.firebaseapp.com",
    databaseURL:       "https://gestoreva-7315a-default-rtdb.europe-west1.firebasedatabase.app",
    projectId:         "gestoreva-7315a",
    storageBucket:     "gestoreva-7315a.firebasestorage.app",
    messagingSenderId: "525319727429",
    appId:             "1:525319727429:web:af07b57b8efa11c2fdf62c"
  };

  // Contraseña admin (cámbiala)
  const ADMIN_PASSWORD = "capitulaciones2025";

  // ══════════════════════════════════════════════════
  //  FIREBASE INIT
  // ══════════════════════════════════════════════════
  firebase.initializeApp(FIREBASE_CONFIG);
  const db      = firebase.database();
  const storage = firebase.storage();
  const avisosRef = db.ref('avisos');

  // ══════════════════════════════════════════════════
  //  ESTADO
  // ══════════════════════════════════════════════════
  let adminActivo = false;
  let selectedFile = null;

  // ══════════════════════════════════════════════════
  //  CARGAR AVISOS
  // ══════════════════════════════════════════════════
  avisosRef.orderByChild('timestamp').on('value', snapshot => {
    const container = document.getElementById('muroContainer');
    const data = snapshot.val();

    if (!data) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="icon">📭</div>
          <h3>Sin avisos por ahora</h3>
          <p>Cuando se publiquen avisos aparecerán aquí.</p>
        </div>`;
      return;
    }

    // Ordenar newest first
    const items = Object.entries(data).sort((a, b) => b[1].timestamp - a[1].timestamp);

    container.innerHTML = `<div class="muro-grid" id="muroGrid"></div>`;
    const grid = document.getElementById('muroGrid');

    items.forEach(([key, aviso]) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.key = key;
      card.innerHTML = `
        <img src="${aviso.imageUrl}" alt="Aviso" loading="lazy">
        <div class="card-body">
          <p>${escapeHtml(aviso.descripcion)}</p>
        </div>
        <div class="card-admin-bar">
          <button class="btn-delete" onclick="eliminarAviso('${key}', '${aviso.storagePath}')">🗑 Eliminar</button>
        </div>`;
      grid.appendChild(card);
    });
  });

  // ══════════════════════════════════════════════════
  //  MODAL ADMIN
  // ══════════════════════════════════════════════════
  function openAdminModal() {
    if (adminActivo) {
      // Ya autenticado → abrir directamente en pantalla upload
      showScreen('screenUpload');
      document.getElementById('modalTitle').textContent = '⬆️ Publicar Aviso';
    } else {
      showScreen('screenPassword');
      document.getElementById('modalTitle').textContent = '🔒 Acceso Admin';
    }
    document.getElementById('modalAdmin').classList.add('open');
    setTimeout(() => document.getElementById('inputPassword')?.focus(), 100);
  }

  function closeModal() {
    document.getElementById('modalAdmin').classList.remove('open');
    resetForm();
  }

  document.getElementById('modalAdmin').addEventListener('click', e => {
    if (e.target === document.getElementById('modalAdmin')) closeModal();
  });

  // ══════════════════════════════════════════════════
  //  AUTENTICACIÓN
  // ══════════════════════════════════════════════════
  function checkPassword() {
    const val = document.getElementById('inputPassword').value;
    if (val === ADMIN_PASSWORD) {
      adminActivo = true;
      document.body.classList.add('admin-active');
      showScreen('screenUpload');
      document.getElementById('modalTitle').textContent = '⬆️ Publicar Aviso';
      document.getElementById('inputPassword').value = '';
    } else {
      showToast('Contraseña incorrecta', 'error');
      document.getElementById('inputPassword').value = '';
      document.getElementById('inputPassword').focus();
    }
  }

  function cerrarSesionAdmin() {
    adminActivo = false;
    document.body.classList.remove('admin-active');
    closeModal();
    showToast('Sesión admin cerrada');
  }

  // ══════════════════════════════════════════════════
  //  SELECCIÓN DE ARCHIVO
  // ══════════════════════════════════════════════════
  function onFileChange(e) {
    const file = e.target.files[0];
    if (!file) return;
    selectedFile = file;

    document.getElementById('fileName').textContent = file.name;
    document.getElementById('uploadArea').classList.add('has-file');

    const reader = new FileReader();
    reader.onload = ev => {
      const img = document.getElementById('previewImg');
      img.src = ev.target.result;
      img.style.display = 'block';
    };
    reader.readAsDataURL(file);
  }

  // ══════════════════════════════════════════════════
  //  SUBIR AVISO
  // ══════════════════════════════════════════════════
  async function subirAviso() {
    const descripcion = document.getElementById('inputDescripcion').value.trim();
    if (!selectedFile) { showToast('Selecciona una imagen', 'error'); return; }
    if (!descripcion)  { showToast('Añade una descripción', 'error'); return; }

    const btn = document.getElementById('btnSubir');
    btn.disabled = true;
    btn.innerHTML = '⏳ Subiendo...';

    const progressWrap = document.getElementById('progressWrap');
    const progressBar  = document.getElementById('progressBar');
    progressWrap.style.display = 'block';

    try {
      const ext = selectedFile.name.split('.').pop();
      const storagePath = `avisos/${Date.now()}.${ext}`;
      const storageRef  = storage.ref(storagePath);
      const uploadTask  = storageRef.put(selectedFile);

      uploadTask.on('state_changed',
        snap => {
          const pct = (snap.bytesTransferred / snap.totalBytes * 100).toFixed(0);
          progressBar.style.width = pct + '%';
        },
        err => {
          showToast('Error al subir la imagen: ' + err.message, 'error');
          btn.disabled = false;
          btn.innerHTML = '⬆️ Publicar aviso';
          progressWrap.style.display = 'none';
        },
        async () => {
          const imageUrl = await uploadTask.snapshot.ref.getDownloadURL();
          await avisosRef.push({
            imageUrl,
            storagePath,
            descripcion,
            timestamp: Date.now()
          });
          showToast('¡Aviso publicado!', 'success');
          closeModal();
          btn.disabled = false;
          btn.innerHTML = '⬆️ Publicar aviso';
          progressWrap.style.display = 'none';
          progressBar.style.width = '0%';
        }
      );
    } catch (err) {
      showToast('Error: ' + err.message, 'error');
      btn.disabled = false;
      btn.innerHTML = '⬆️ Publicar aviso';
      progressWrap.style.display = 'none';
    }
  }

  // ══════════════════════════════════════════════════
  //  ELIMINAR AVISO
  // ══════════════════════════════════════════════════
  async function eliminarAviso(key, storagePath) {
    if (!confirm('¿Eliminar este aviso?')) return;
    try {
      await avisosRef.child(key).remove();
      if (storagePath) {
        await storage.ref(storagePath).delete().catch(() => {});
      }
      showToast('Aviso eliminado', 'success');
    } catch (err) {
      showToast('Error al eliminar: ' + err.message, 'error');
    }
  }

  // ══════════════════════════════════════════════════
  //  HELPERS
  // ══════════════════════════════════════════════════
  function showScreen(id) {
    ['screenPassword', 'screenUpload'].forEach(s => {
      document.getElementById(s).style.display = s === id ? 'block' : 'none';
    });
  }

  function resetForm() {
    selectedFile = null;
    const fi = document.getElementById('inputFile');
    if (fi) fi.value = '';
    const fn = document.getElementById('fileName');
    if (fn) fn.textContent = '';
    const ua = document.getElementById('uploadArea');
    if (ua) ua.classList.remove('has-file');
    const pi = document.getElementById('previewImg');
    if (pi) { pi.style.display = 'none'; pi.src = ''; }
    const td = document.getElementById('inputDescripcion');
    if (td) td.value = '';
  }

  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (type ? ' ' + type : '');
    setTimeout(() => t.className = 'toast', 3000);
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
  }
</script>
</body>
</html>
