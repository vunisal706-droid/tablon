<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muro de Avisos · CEIP Capitulaciones</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
:root{--verde:#2d6a4f;--verde-claro:#40916c;--verde-palido:#d8f3dc;--ocre:#e9c46a;--crema:#fdf8f0;--carbon:#1a1a2e;--gris:#6b7280;--blanco:#fff}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--crema);color:var(--carbon);min-height:100vh}
header{background:var(--verde);color:var(--blanco);position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(45,106,79,.35)}
.header-inner{max-width:1200px;margin:0 auto;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.header-logo{display:flex;align-items:center;gap:14px}
.logo-img{width:48px;height:48px;border-radius:50%;object-fit:cover;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.header-text h1{font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:900;line-height:1.1}
.header-text p{font-size:.75rem;opacity:.75;margin-top:2px;letter-spacing:.05em;text-transform:uppercase}
.header-badge{background:var(--ocre);color:var(--carbon);font-size:.7rem;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:.08em;text-transform:uppercase}
.hero-strip{background:linear-gradient(135deg,var(--verde-claro),var(--verde));padding:32px 24px 48px;text-align:center}
.hero-strip h2{font-family:'Playfair Display',serif;font-size:clamp(1.6rem,4vw,2.4rem);color:var(--blanco);font-weight:900}
.hero-strip p{color:rgba(255,255,255,.8);font-size:.95rem;margin-top:6px}
main{max-width:1200px;margin:0 auto;padding:40px 20px 80px}
.muro-grid{columns:3 300px;column-gap:20px}
.card{break-inside:avoid;background:var(--blanco);border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.10);overflow:hidden;margin-bottom:20px;transition:transform .25s,box-shadow .25s;cursor:pointer}
.card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.18)}
.card img{width:100%;display:block;object-fit:cover;background:var(--verde-palido)}
.card-body{padding:14px 16px 16px;border-top:3px solid var(--ocre)}
.card-body p{font-size:.92rem;color:var(--carbon);line-height:1.55}
.card-admin-bar{display:none;padding:8px 12px;background:#fff5f5;border-top:1px solid #fee2e2;text-align:right}
body.admin-active .card-admin-bar{display:block}
.empty-state{text-align:center;padding:80px 20px;color:var(--gris)}
.empty-state .icon{font-size:56px;margin-bottom:16px;opacity:.4}
.empty-state h3{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--verde);margin-bottom:8px}
.loading-state{text-align:center;padding:60px 20px;color:var(--gris);display:flex;flex-direction:column;align-items:center;gap:16px}
.spinner{width:36px;height:36px;border:3px solid var(--verde-palido);border-top-color:var(--verde);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;padding:20px;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.lightbox.open{display:flex}
.lightbox img{max-width:100%;max-height:75vh;border-radius:12px;object-fit:contain;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.lightbox-desc{color:rgba(255,255,255,.9);font-size:1rem;text-align:center;max-width:600px;line-height:1.6;background:rgba(255,255,255,.08);padding:12px 20px;border-radius:10px}
.lightbox-close{position:absolute;top:16px;right:20px;background:rgba(255,255,255,.15);border:none;color:#fff;width:40px;height:40px;border-radius:50%;font-size:1.2rem;cursor:pointer}
.btn-admin-toggle{position:fixed;bottom:24px;right:24px;background:var(--verde);color:var(--blanco);border:none;border-radius:50px;padding:14px 22px;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;box-shadow:0 4px 20px rgba(45,106,79,.4);display:flex;align-items:center;gap:8px;z-index:200}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(26,26,46,.6);backdrop-filter:blur(4px);z-index:300;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--blanco);border-radius:20px;width:100%;max-width:460px;box-shadow:0 20px 60px rgba(0,0,0,.25);overflow:hidden}
.modal-header{background:var(--verde);color:var(--blanco);padding:20px 24px;display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700}
.btn-close{background:rgba(255,255,255,.15);border:none;color:var(--blanco);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1rem}
.modal-body{padding:24px}
.form-group{margin-bottom:18px}
label{display:block;font-size:.82rem;font-weight:600;color:var(--verde);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
input[type=password],textarea{width:100%;border:2px solid #e5e7eb;border-radius:10px;padding:10px 14px;font-family:'DM Sans',sans-serif;font-size:.95rem;color:var(--carbon);background:#fafafa}
input[type=password]:focus,textarea:focus{outline:none;border-color:var(--verde-claro);background:var(--blanco)}
textarea{resize:vertical;min-height:90px}
.upload-area{border:2.5px dashed var(--verde-claro);border-radius:12px;padding:28px 20px;text-align:center;cursor:pointer;background:var(--verde-palido);position:relative}
.upload-area.has-file{border-color:#c9922a;background:#fef9ec}
.upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-area .upload-icon{font-size:32px;margin-bottom:8px}
.upload-area p{font-size:.85rem;color:var(--gris);pointer-events:none}
.upload-area .file-name{font-weight:600;color:var(--verde);font-size:.85rem;margin-top:6px}
.preview-img{width:100%;max-height:200px;object-fit:cover;border-radius:10px;margin-top:12px;display:none}
.btn-submit{width:100%;background:var(--verde);color:var(--blanco);border:none;border-radius:10px;padding:13px;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-submit:disabled{opacity:.6;cursor:not-allowed}
.progress-wrap{display:none;background:var(--verde-palido);border-radius:8px;height:8px;margin-top:12px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--verde-claro),var(--ocre));border-radius:8px;transition:width .3s;width:0%}
.toast{position:fixed;bottom:90px;right:24px;background:var(--carbon);color:var(--blanco);padding:12px 20px;border-radius:10px;font-size:.9rem;font-weight:500;z-index:400;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;max-width:280px}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{background:var(--verde)}
.toast.error{background:#dc2626}
.admin-banner{display:none;background:var(--ocre);color:var(--carbon);text-align:center;padding:8px;font-size:.82rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
body.admin-active .admin-banner{display:block}
.btn-delete{background:none;border:none;color:#dc2626;font-size:.8rem;font-weight:600;cursor:pointer;padding:2px 6px;border-radius:6px}
@media(max-width:600px){.header-inner{padding:12px 16px}main{padding:24px 12px 80px}.muro-grid{columns:1}}
@media(min-width:601px) and (max-width:900px){.muro-grid{columns:2 280px}}
</style>
</head>

<div class="hero-strip">
  <h2>&#128203; Muro de Avisos</h2>
  <p>Información y comunicaciones del centro</p>
</div>
<main>
  <div id="muroContainer">
    <div class="loading-state"><div class="spinner"></div><span>Cargando avisos...</span></div>
  </div>
</main>
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">&#10005;</button>
  <img id="lightboxImg" src="" alt="Aviso">
  <div class="lightbox-desc" id="lightboxDesc"></div>
</div>
<button class="btn-admin-toggle" id="btnAdmin">&#9881;&#65039; Admin</button>
<div class="modal-overlay" id="modalAdmin">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Acceso Admin</h3>
      <button class="btn-close" id="btnClose">&#10005;</button>
    </div>
    <div class="modal-body">
      <div id="screenPassword">
        <div class="form-group">
          <label>Contrasena</label>
          <input type="password" id="inputPassword" placeholder="Introduce la contrasena">
        </div>
        <button class="btn-submit" id="btnCheckPass">&#128275; Entrar</button>
      </div>
      <div id="screenUpload" style="display:none">
        <div class="form-group">
          <label>Imagen del aviso</label>
          <div class="upload-area" id="uploadArea">
            <input type="file" id="inputFile" accept="image/*">
            <div class="upload-icon">&#128444;&#65039;</div>
            <p>Pulsa para seleccionar imagen</p>
            <div class="file-name" id="fileName"></div>
          </div>
          <img id="previewImg" class="preview-img" alt="Preview">
        </div>
        <div class="form-group">
          <label>Descripcion</label>
          <textarea id="inputDescripcion" placeholder="Añade una descripcion del aviso..." rows="3"></textarea>
        </div>
        <button class="btn-submit" id="btnSubir">&#11014;&#65039; Publicar aviso</button>
        <div class="progress-wrap" id="progressWrap"><div class="progress-bar" id="progressBar"></div></div>
        <div style="margin-top:16px;text-align:center">
          <button id="btnCerrarSesion" style="background:none;border:none;color:var(--gris);font-size:.82rem;cursor:pointer;text-decoration:underline">Cerrar sesion admin</button>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
var ADMIN_PASSWORD = "capitulaciones2025";
var MAX_W = 1200;
var QUALITY = 0.82;
var adminActivo = false;
var selectedFile = null;
var avisosData = {};

var firebaseConfig = {
  apiKey: "AIzaSyAyxeVnd6mTBzK-J2cI_7LuygIiInXZ660",
  authDomain: "gestoreva-7315a.firebaseapp.com",
  databaseURL: "https://gestoreva-7315a-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "gestoreva-7315a",
  storageBucket: "gestoreva-7315a.firebasestorage.app",
  messagingSenderId: "525319727429",
  appId: "1:525319727429:web:af07b57b8efa11c2fdf62c"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();
var avisosRef = db.ref("avisos_tablon");

avisosRef.on("value", function(snap) {
  avisosData = snap.val() || {};
  var container = document.getElementById("muroContainer");
  var keys = Object.keys(avisosData);
  if (keys.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">&#128237;</div><h3>Sin avisos por ahora</h3><p>Cuando se publiquen avisos aparecerán aquí.</p></div>';
    return;
  }
  var items = keys.map(function(k){ return [k, avisosData[k]]; });
  items.sort(function(a,b){ return b[1].timestamp - a[1].timestamp; });
  container.innerHTML = '<div class="muro-grid" id="muroGrid"></div>';
  var grid = document.getElementById("muroGrid");
  items.forEach(function(item) {
    var key = item[0];
    var aviso = item[1];
    var card = document.createElement("div");
    card.className = "card";
    var img = document.createElement("img");
    img.src = aviso.imageB64;
    img.alt = "Aviso";
    img.loading = "lazy";
    img.onclick = function(){ openLightbox(key); };
    var body = document.createElement("div");
    body.className = "card-body";
    body.onclick = function(){ openLightbox(key); };
    var p = document.createElement("p");
    p.textContent = aviso.descripcion;
    body.appendChild(p);
    var adminBar = document.createElement("div");
    adminBar.className = "card-admin-bar";
    var delBtn = document.createElement("button");
    delBtn.className = "btn-delete";
    delBtn.textContent = "Eliminar";
    delBtn.onclick = function(e){ e.stopPropagation(); eliminarAviso(key); };
    adminBar.appendChild(delBtn);
    card.appendChild(img);
    card.appendChild(body);
    card.appendChild(adminBar);
    grid.appendChild(card);
  });
});

function openLightbox(key) {
  var a = avisosData[key];
  if (!a) return;
  document.getElementById("lightboxImg").src = a.imageB64;
  document.getElementById("lightboxDesc").textContent = a.descripcion;
  document.getElementById("lightbox").classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeLightbox() {
  document.getElementById("lightbox").classList.remove("open");
  document.body.style.overflow = "";
}
document.getElementById("lightbox").addEventListener("click", function(e){
  if (e.target === document.getElementById("lightbox")) closeLightbox();
});
document.getElementById("lightboxClose").addEventListener("click", closeLightbox);
document.addEventListener("keydown", function(e){ if(e.key==="Escape") closeLightbox(); });

document.getElementById("btnAdmin").addEventListener("click", openAdminModal);
document.getElementById("btnClose").addEventListener("click", closeModal);
document.getElementById("btnCheckPass").addEventListener("click", checkPassword);
document.getElementById("btnSubir").addEventListener("click", subirAviso);
document.getElementById("btnCerrarSesion").addEventListener("click", cerrarSesionAdmin);
document.getElementById("inputFile").addEventListener("change", onFileChange);
document.getElementById("inputPassword").addEventListener("keydown", function(e){
  if (e.key === "Enter") checkPassword();
});
document.getElementById("modalAdmin").addEventListener("click", function(e){
  if (e.target === document.getElementById("modalAdmin")) closeModal();
});

function openAdminModal() {
  if (adminActivo) {
    showScreen("screenUpload");
    document.getElementById("modalTitle").textContent = "Publicar Aviso";
  } else {
    showScreen("screenPassword");
    document.getElementById("modalTitle").textContent = "Acceso Admin";
  }
  document.getElementById("modalAdmin").classList.add("open");
  if (!adminActivo) setTimeout(function(){ document.getElementById("inputPassword").focus(); }, 100);
}
function closeModal() {
  document.getElementById("modalAdmin").classList.remove("open");
  resetForm();
}
function checkPassword() {
  var val = document.getElementById("inputPassword").value;
  if (val === ADMIN_PASSWORD) {
    adminActivo = true;
    document.body.classList.add("admin-active");
    showScreen("screenUpload");
    document.getElementById("modalTitle").textContent = "Publicar Aviso";
    document.getElementById("inputPassword").value = "";
  } else {
    showToast("Contrasena incorrecta", "error");
    document.getElementById("inputPassword").value = "";
  }
}
function cerrarSesionAdmin() {
  adminActivo = false;
  document.body.classList.remove("admin-active");
  closeModal();
  showToast("Sesion admin cerrada");
}
function onFileChange(e) {
  var file = e.target.files[0];
  if (!file) return;
  selectedFile = file;
  document.getElementById("fileName").textContent = file.name;
  document.getElementById("uploadArea").classList.add("has-file");
  var reader = new FileReader();
  reader.onload = function(ev) {
    var img = document.getElementById("previewImg");
    img.src = ev.target.result;
    img.style.display = "block";
  };
  reader.readAsDataURL(file);
}
function comprimirImagen(file) {
  return new Promise(function(resolve, reject) {
    var reader = new FileReader();
    reader.onload = function(ev) {
      var img = new Image();
      img.onload = function() {
        var w = img.width, h = img.height;
        if (w > MAX_W) { h = Math.round(h * MAX_W / w); w = MAX_W; }
        var canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL("image/jpeg", QUALITY));
      };
      img.onerror = reject;
      img.src = ev.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function subirAviso() {
  var descripcion = document.getElementById("inputDescripcion").value.trim();
  if (!selectedFile) { showToast("Selecciona una imagen", "error"); return; }
  if (!descripcion) { showToast("Añade una descripcion", "error"); return; }
  var btn = document.getElementById("btnSubir");
  btn.disabled = true; btn.textContent = "Comprimiendo...";
  var pw = document.getElementById("progressWrap");
  var pb = document.getElementById("progressBar");
  pw.style.display = "block"; pb.style.width = "30%";
  comprimirImagen(selectedFile).then(function(imageB64) {
    pb.style.width = "70%";
    btn.textContent = "Publicando...";
    return avisosRef.push({ imageB64: imageB64, descripcion: descripcion, timestamp: Date.now() });
  }).then(function() {
    pb.style.width = "100%";
    showToast("Aviso publicado!", "success");
    setTimeout(function(){ pw.style.display="none"; pb.style.width="0%"; }, 600);
    closeModal();
    btn.disabled = false; btn.textContent = "Publicar aviso";
  }).catch(function(err) {
    showToast("Error: " + err.message, "error");
    pw.style.display = "none";
    btn.disabled = false; btn.textContent = "Publicar aviso";
  });
}
function eliminarAviso(key) {
  if (!confirm("Eliminar este aviso?")) return;
  avisosRef.child(key).remove().then(function(){
    showToast("Aviso eliminado", "success");
  }).catch(function(err){
    showToast("Error: " + err.message, "error");
  });
}
function showScreen(id) {
  document.getElementById("screenPassword").style.display = id === "screenPassword" ? "block" : "none";
  document.getElementById("screenUpload").style.display = id === "screenUpload" ? "block" : "none";
}
function resetForm() {
  selectedFile = null;
  var fi = document.getElementById("inputFile"); if(fi) fi.value = "";
  var fn = document.getElementById("fileName"); if(fn) fn.textContent = "";
  var ua = document.getElementById("uploadArea"); if(ua) ua.classList.remove("has-file");
  var pi = document.getElementById("previewImg"); if(pi){ pi.style.display="none"; pi.src=""; }
  var td = document.getElementById("inputDescripcion"); if(td) td.value = "";
}
function showToast(msg, type) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show" + (type ? " " + type : "");
  setTimeout(function(){ t.className = "toast"; }, 3000);
}
</script>
</body>
</html>
